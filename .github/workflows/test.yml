name: Build and Test
on: [push]
deps:
  - node
  - npm

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v2
    - name: Setup Node
      uses: actions/setup-node@v1
      with:
        node-version: '14'
    - name: Install dependencies
      run: npm install
    - name: Mock build
      run: echo 'Mock build successful'
    - name: Test
      run: echo 'Test successful'